<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Calcolatrice con funzioni</title>
    <style>
        body {
            background-color: #515c61;
        }
        #result {
            font-family: "Courier New", Courier, monospace;
            font-weight: 700;
            font-size: 30px;
            color: white;
        }
        #sfondo {
            place-self: center;
            padding: 3em;
            border-style: solid;
            border-width: 1px;
            background-color: #121214;
            border-color: white;
            border-radius: 20px;
            align-items: center;
            height: 400px;
            width: 480px;
        }
        h1 {
            font-family: "Trebuchet MS", Helvetica, sans-serif;
            letter-spacing: -4px;
            text-align: center;
            font-size: 50px;
            color: white;
        }
        h2 {
            font-family: "Trebuchet MS", Helvetica, sans-serif;
            text-align: center;
            color: black;
        }
        form {
            font-family: "Courier New", Courier, monospace;
            font-weight: 700;
            font-size: 23px;
            color: white;
        }
        button {
            font-family: "Trebuchet MS", Helvetica, sans-serif;
            font-weight: 700;
            background-color: #515c61;
            color: white;
            font-size: 30px;
            border-radius: 10px;
            display: block;
            margin: 0 auto;
            width: 40%; 
        }
        input {
            font-family: "Courier New", Courier, monospace;
            font-weight: 1000;
            font-size: 18px;
            background-color: #87796b;
            border-color: black;
        }
        ::placeholder {
            color: #0f0e0b;
        }
    </style>
</head>
<body>
    <h1>Calcolatrice <font color=black>2.0</font></h1>
    <h2>Utilizzando le funzioni</h2>
    <div id="sfondo">
    <form id="calculatorForm" onsubmit="calcola(); return false;">
        Primo numero: <input type="text" id="a" required><br>
        Secondo numero: <input type="text" id="b" required><br>
        Operazione: <input type="text" id="operation" placeholder="+, -, *, /, **" required><br>
        <br>
        <button type="submit">Calcola</button>
    </form>
    <br> 
    <br> <!--Aggiungo 2 spazi -->
    <!-- Div per visualizzare il risultato o gli errori -->
    <div id="result"></div>
    </div>

    <script>
        // Funzione chiamata al submit del form
        function calcola() {
            // Legge i valori inseriti dall'utente
            const num1Input = document.getElementById('a').value;
            const num2Input = document.getElementById('b').value;
            const operation = document.getElementById('operation').value.trim(); // trim() rimuove spazi iniziali/finali
            const resultDiv = document.getElementById('result'); // Div per il risultato

            // Converte i valori in numeri decimali
            const a = parseFloat(num1Input);
            const b = parseFloat(num2Input);

            // Verifica se i numeri sono validi
            if (Number.isNaN(a) || Number.isNaN(b)) {
                resultDiv.textContent = 'Errore: Inserisci due numeri validi.';
                return; // Esce dalla funzione se i numeri non sono validi
            }

            const operazioni= { //funzione
	            somma: (a, b)=> a+b,
	            sottrazione: (a, b)=> a-b,
	            moltiplicazione: (a, b)=> a*b,
	            divisione: (a, b)=> {
		            if(b!=0) { //in quanto non è possibile dividere per 0
                        return a/b;
	                } else {
                        resultDiv.textContent = 'Errore: Non è possibile eseguire la divisione per 0.';
                    }
                },
                potenza: (a, b)=> a**b
            };
            let result;
            try {
                // Esegue l'operazione richiesta
                switch(operation){ // In base al simbolo di operazione scelta calcola il risultato
                    case "+":
                        result=operazioni.somma(a, b);
                        break;
                    case "-":
                        result=operazioni.sottrazione(a, b);
                        break;
                    case "*":
                        result=operazioni.moltiplicazione(a, b);
                        break;
                    case "/":
                        result=operazioni.divisione(a, b);
                        break;
                    case "**":
                        result=operazioni.potenza(a, b);
                        break;
                }
                resultDiv.textContent = 'Risultato: ' + result;
            } catch (error) {
                // Mostra l'errore se si verifica un problema
                resultDiv.textContent = 'Si è verificato un errore. ' + error.message;
            }
        }
    </script>
</body>
</html>
